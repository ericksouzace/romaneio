<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Romaneio Pijama de Rica</title>
  <meta name="theme-color" content="#9a7242">

  <style>
    * { box-sizing: border-box; }

    :root {
      --ink: #27221e;
      --muted: #746a62;
      --line: #2b2724;
      --soft: #b8aea5;
      --gold: #9a7242;
      --gold-dark: #7f5a31;
      --bg: #fff7ed;
      --danger: #b64a4a;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(#fffaf4, #fff2e3);
      color: var(--ink);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    button, input, select {
      font: inherit;
    }

    .portrait-warning {
      display: none;
    }

    .app {
      width: min(1420px, 100%);
      margin: auto;
      padding: 16px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn {
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      padding: 0 17px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn.light {
      background: #fff;
      border: 1px solid #dfd4c8;
      color: var(--ink);
    }

    .btn.primary {
      background: linear-gradient(135deg, #b58a55, #805a2f);
      color: #fff;
    }

    .btn.danger {
      background: var(--danger);
      color: #fff;
    }

    .sheet {
      background: #fff;
      border: 2px solid var(--line);
      padding: 16px;
      min-height: 720px;
    }

    .header {
      display: grid;
      grid-template-columns: 225px 1fr 245px;
      gap: 16px;
      align-items: start;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--line);
    }

    .logo {
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
    }

    .logo img {
      display: block;
      width: 205px;
      max-height: 105px;
      object-fit: contain;
      object-position: left top;
    }

    .header-center {
      min-height: 20px;
    }

    .dates {
      display: grid;
      gap: 9px;
    }

    .field label {
      display: block;
      margin-bottom: 3px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 31px;
      border: 0;
      border-bottom: 1px solid #777;
      background: transparent;
      outline: none;
      padding: 0 4px;
      font-size: 13px;
      color: var(--ink);
    }

    .customer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 40px;
      max-width: 810px;
      padding: 13px 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .table-wrap {
      margin-top: 14px;
      border: 1px solid var(--line);
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 1110px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border-right: 1px solid var(--soft);
      border-bottom: 1px solid var(--soft);
      padding: 4px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      height: 38px;
      background: #fffaf2;
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 900;
    }

    td {
      height: 38px;
      font-size: 11px;
    }

    td input,
    td select {
      width: 100%;
      min-height: 28px;
      border: 0;
      background: transparent;
      outline: none;
      text-align: center;
      font-size: 11px;
      padding: 0 3px;
      color: var(--ink);
    }

    .size { width: 48px; }
    .model { width: 260px; }
    .color { width: 155px; }
    .bias { width: 105px; }
    .money { width: 115px; }
    .action { width: 80px; }

    .model-select,
    .color-input,
    .bias-input {
      text-align: left;
    }

    .custom-model {
      display: none !important;
      width: 100%;
      margin-top: 4px;
      min-height: 28px;
      border-top: 1px solid #d7cec6 !important;
      text-align: left !important;
      padding-left: 4px !important;
    }

    .custom-model.show {
      display: block !important;
    }

    .row-total {
      font-weight: 900;
      white-space: nowrap;
    }

    .remove {
      min-height: 29px;
      border: 0;
      border-radius: 999px;
      padding: 0 9px;
      background: var(--danger);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .table-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 28px;
      align-items: end;
      min-height: 170px;
      margin-top: 20px;
    }

    .observations {
      align-self: start;
    }

    .totals {
      border: 1px solid var(--line);
    }

    .line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 39px;
      padding: 6px 11px;
      border-bottom: 1px solid var(--soft);
    }

    .line:last-child {
      border-bottom: 0;
    }

    .line span {
      font-weight: 900;
    }

    .line input {
      width: 115px;
      min-height: 27px;
      border: 0;
      border-bottom: 1px solid #777;
      background: transparent;
      text-align: right;
      outline: none;
      color: var(--ink);
    }

    .final {
      background: #fffaf2;
    }

    .final strong {
      font-size: 18px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
    }

    @media (max-width: 950px) {
      .app { padding: 10px; }
      .sheet { padding: 10px; }
      .header {
        grid-template-columns: 180px minmax(260px,1fr) 210px;
      }

      .logo img {
        width: 165px;
        max-height: 82px;
      }

      .customer {
        max-width: none;
        gap: 8px 22px;
      }

      .footer {
        grid-template-columns: 1fr 310px;
      }
    }

    @media (orientation: portrait) and (max-width: 950px) {
      .app { display: none; }

      .portrait-warning {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
        background: linear-gradient(#fffaf4, #fff1e2);
        text-align: center;
      }

      .portrait-warning strong {
        display: block;
        margin-bottom: 10px;
        color: var(--gold);
        font-size: 25px;
      }

      .portrait-warning p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 7mm;
      }

      html, body {
        background: #fff !important;
      }

      .app {
        width: 100%;
        padding: 0;
      }

      .toolbar,
      .no-print,
      .table-actions,
      .status,
      .portrait-warning {
        display: none !important;
      }

      .sheet {
        min-height: auto;
        border: 1px solid #000;
        padding: 9px;
      }

      .header {
        grid-template-columns: 175px 1fr 205px;
        gap: 10px;
        padding-bottom: 7px;
      }

      .logo img {
        width: 160px;
        max-height: 75px;
      }

      .customer {
        gap: 5px 26px;
        max-width: 690px;
        padding: 7px 0 8px;
      }

      .field label {
        font-size: 8.5px;
      }

      .field input,
      .field select {
        min-height: 20px;
        font-size: 9px;
      }

      .table-wrap {
        margin-top: 8px;
        overflow: visible;
      }

      table {
        min-width: 0;
      }

      th, td {
        padding: 2px;
        font-size: 8px;
      }

      th {
        height: 25px;
        font-size: 7.5px;
      }

      td {
        height: 25px;
      }

      td input, td select {
        min-height: 18px;
        font-size: 8px;
      }

      .size { width: 31px; }
      .model { width: 184px; }
      .color { width: 102px; }
      .bias { width: 72px; }
      .money { width: 80px; }

      .custom-model {
        margin-top: 1px;
      }

      .footer {
        grid-template-columns: 1fr 260px;
        gap: 18px;
        min-height: 110px;
        margin-top: 10px;
      }

      .line {
        min-height: 27px;
        padding: 3px 7px;
        font-size: 8.5px;
      }

      .line input {
        width: 80px;
        min-height: 18px;
        font-size: 8.5px;
      }

      .final strong {
        font-size: 12px;
      }
    }
  </style>
</head>

        </div>

        <div class="header-center"></div>

        <div class="dates">
          <div class="field">
            <label>Data do pedido</label>
            <input id="orderDate" type="date">
          </div>

          <div class="field">
            <label>Data do envio</label>
            <input id="shippingDate" type="date">
          </div>
        </div>
      </header>

      <section class="customer">
        <div class="field">
          <label>Cliente</label>
          <input id="customerName" type="text" placeholder="Nome da cliente">
        </div>

        <div class="field">
          <label>Telefone</label>
          <input id="customerPhone" type="tel" placeholder="(00) 00000-0000">
        </div>

        <div class="field">
          <label>Forma de pagamento</label>
          <input id="paymentMethod" type="text" placeholder="Pix, cartão, dinheiro...">
        </div>

        <div class="field">
          <label>Forma de envio</label>
          <input id="shippingMethod" type="text" placeholder="Correios, motoboy, retirada...">
        </div>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="size">P</th>
              <th class="size">M</th>
              <th class="size">G</th>
              <th class="size">GG</th>
              <th class="size">G1</th>
              <th class="model">Descrição / Modelo</th>
              <th class="color">Cor / Estampa</th>
              <th class="bias">Viés</th>
              <th class="money">Valor unit.</th>
              <th class="money">Valor total</th>
              <th class="action no-print">Ação</th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
      </section>

      <div class="table-actions no-print">
        <button id="addRow" class="btn light" type="button">+ Adicionar linha</button>
        <button id="clearRows" class="btn danger" type="button">Limpar linhas</button>
      </div>

      <section class="footer">
        <div class="observations field">
          <label>Observações</label>
          <input id="observations" type="text" placeholder="Anotações do pedido">
        </div>

        <div class="totals">
          <div class="line">
            <span>Subtotal</span>
            <strong id="subtotal">R$ 0,00</strong>
          </div>

          <div class="line">
            <span>Desconto (%)</span>
            <input id="discountPercent" type="number" min="0" max="100" step="0.01" value="0">
          </div>

          <div class="line">
            <span>Valor do desconto</span>
            <strong id="discountValue">R$ 0,00</strong>
          </div>

          <div class="line">
            <span>Entrada</span>
            <input id="entryValue" type="number" min="0" step="0.01" value="0">
          </div>

          <div class="line">
            <span>Valor total</span>
            <strong id="finalValue">R$ 0,00</strong>
          </div>

          <div class="line final">
            <span>Restante</span>
            <strong id="remainingValue">R$ 0,00</strong>
          </div>
        </div>
      </section>
    </section>

    <p id="status" class="status no-print">Pronto para preencher.</p>
  </main>

  <script>
    const SIZES = ["p", "m", "g", "gg", "g1"];

    const MODELS = [
      "AMERICANO CURTO",
      "AMERICANO CALÇA E BLUSA MANGA CURTA",
      "AMERICANO CALÇA E BLUSA MANGA LONGA",
      "GOLA REDONDA"
    ];

    const bodyRows = document.getElementById("itemsBody");
    const subtotal = document.getElementById("subtotal");
    const discountPercent = document.getElementById("discountPercent");
    const discountValue = document.getElementById("discountValue");
    const entryValue = document.getElementById("entryValue");
    const finalValue = document.getElementById("finalValue");
    const remainingValue = document.getElementById("remainingValue");
    const status = document.getElementById("status");

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("orderDate").value = new Date().toISOString().slice(0, 10);

      for (let i = 0; i < 8; i++) {
        addRow();
      }

      document.getElementById("addRow").addEventListener("click", () => addRow());
      document.getElementById("clearRows").addEventListener("click", clearRows);
      document.getElementById("printFile").addEventListener("click", printCurrentPage);
      document.getElementById("saveFile").addEventListener("click", saveFile);

      discountPercent.addEventListener("input", calculate);
      entryValue.addEventListener("input", calculate);
    });

    function createModelOptions(value = "") {
      return `
        <option value="">Selecione o modelo</option>
        ${MODELS.map(model => `<option value="${escapeAttr(model)}" ${value === model ? "selected" : ""}>${escapeHtml(model)}</option>`).join("")}
        <option value="OUTRO_MODELO" ${value === "OUTRO_MODELO" ? "selected" : ""}>OUTRO MODELO</option>
      `;
    }

    function addRow(data = {}) {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        ${SIZES.map(size => `
          <td>
            <input class="size-${size}" type="number" min="0" step="1" value="${escapeAttr(data[size] || "")}" placeholder="0">
          </td>
        `).join("")}

        <td>
          <select class="model-select">
            ${createModelOptions(data.model || "")}
          </select>
          <input class="custom-model ${data.model === "OUTRO_MODELO" ? "show" : ""}" type="text" value="${escapeAttr(data.customModel || "")}" placeholder="Digite o outro modelo">
        </td>

        <td>
          <input class="color-input" type="text" value="${escapeAttr(data.color || "")}" placeholder="Cor / estampa">
        </td>

        <td>
          <input class="bias-input" type="text" value="${escapeAttr(data.bias || "")}" placeholder="Viés">
        </td>

        <td>
          <input class="unit-value" type="number" min="0" step="0.01" value="${escapeAttr(data.unitValue || "")}" placeholder="0,00">
        </td>

        <td class="row-total">R$ 0,00</td>

        <td class="no-print">
          <button class="remove" type="button">Remover</button>
        </td>
      `;

      const select = tr.querySelector(".model-select");
      const customInput = tr.querySelector(".custom-model");

      function updateCustomModelVisibility() {
        if (select.value === "OUTRO_MODELO") {
          customInput.classList.add("show");
        } else {
          customInput.classList.remove("show");
          customInput.value = "";
        }
      }

      updateCustomModelVisibility();

      select.addEventListener("change", () => {
        updateCustomModelVisibility();
        calculate();
      });

      tr.querySelectorAll("input, select").forEach(el => {
        el.addEventListener("input", calculate);
        el.addEventListener("change", calculate);
      });

      tr.querySelector(".remove").addEventListener("click", () => {
        tr.remove();
        calculate();
      });

      bodyRows.appendChild(tr);
      calculate();
    }

    function clearRows() {
      if (!confirm("Deseja limpar todas as linhas?")) return;

      bodyRows.innerHTML = "";
      addRow();
      calculate();
    }

    function getQuantity(row) {
      return SIZES.reduce((sum, size) => {
        return sum + Number(row.querySelector(`.size-${size}`)?.value || 0);
      }, 0);
    }

    function calculate() {
      let sub = 0;

      bodyRows.querySelectorAll("tr").forEach(row => {
        const qty = getQuantity(row);
        const unit = Number(row.querySelector(".unit-value")?.value || 0);
        const total = qty * unit;

        row.querySelector(".row-total").textContent = currency(total);
        sub += total;
      });

      let pct = Number(discountPercent.value || 0);
      if (pct < 0) pct = 0;
      if (pct > 100) pct = 100;
      discountPercent.value = pct;

      const disc = sub * (pct / 100);
      const final = Math.max(0, sub - disc);
      const remain = Math.max(0, final - Number(entryValue.value || 0));

      subtotal.textContent = currency(sub);
      discountValue.textContent = currency(disc);
      finalValue.textContent = currency(final);
      remainingValue.textContent = currency(remain);
    }

    function getFinalModelName(row) {
      const select = row.querySelector(".model-select");
      const custom = row.querySelector(".custom-model");

      if (!select) return "";
      if (select.value === "OUTRO_MODELO") return custom ? custom.value.trim() : "";
      return select.value || "";
    }

    function collectRows() {
      return [...bodyRows.querySelectorAll("tr")].map(row => {
        const item = {
          model: getFinalModelName(row),
          color: row.querySelector(".color-input")?.value || "",
          bias: row.querySelector(".bias-input")?.value || "",
          unit: Number(row.querySelector(".unit-value")?.value || 0),
          sizes: {}
        };

        SIZES.forEach(size => {
          item.sizes[size] = row.querySelector(`.size-${size}`)?.value || "";
        });

        item.quantity = SIZES.reduce((sum, size) => sum + Number(item.sizes[size] || 0), 0);
        item.total = item.quantity * item.unit;

        return item;
      }).filter(item => {
        return item.quantity > 0 || item.model || item.color || item.bias || item.unit > 0;
      });
    }

    function printCurrentPage() {
      calculate();
      window.print();
    }

      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
